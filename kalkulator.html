<!DOCTYPE html>
<html>
<head>
<title>Kalkulator Sederhana</title>

<style>

body{
    font-family: Arial;
    background:#f5f5f5;
}

.kalkulator{
    width:350px;
    margin:50px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
    width:95%;
    padding:10px;
    margin:5px 0;
}

button{
    padding:10px 15px;
    margin:5px;
}

#hasil{
    margin-top:15px;
    font-size:20px;
    font-weight:bold;
}

</style>

</head>
<body>
<div class="kalkulator">
<h2>Kalkulator Sederhana</h2>
<input type="number" id="angka1" placeholder="Masukkan angka pertama">
<input type="number" id="angka2" placeholder="Masukkan angka kedua">

<br>

<button onclick="hitung('+')">+</button>
<button onclick="hitung('-')">-</button>
<button onclick="hitung('*')">×</button>
<button onclick="hitung('/')">÷</button>

<div id="hasil"></div>
</div>

<script>
function hitung(operator){

let a = parseFloat(document.getElementById("angka1").value);
let b = parseFloat(document.getElementById("angka2").value);
let hasil;

switch(operator){

    case '+':
        hasil = a + b;
        break;

    case '-':
        hasil = a - b;
        break;

    case '*':
        hasil = a * b;
        break;

    case '/':
        hasil = a / b;
        break;
}

document.getElementById("hasil").innerHTML =
"Hasil = " + hasil;
}
</script>
</body>
</html>
