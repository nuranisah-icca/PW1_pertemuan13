<!DOCTYPE html>
<html lang="en">

<body>
    <script>

function tentukanGrade(nilai){

    if(nilai >= 85){
        return "A";
    }
    else if(nilai >= 75){
        return "B";
    }
    else if(nilai >= 65){
        return "C";
    }
    else{
        return "D";
    }

}

let grade = tentukanGrade(85);

console.log("Grade = " + grade);

</script>
</body>
</html>
